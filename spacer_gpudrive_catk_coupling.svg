<svg width="100%" viewBox="0 0 700 760" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title>GPUDrive to CAT-K coupling</title>
<desc>How reference_code/gpudrive (simulator + pi_theta) is coupled to reference_code/catk + checkpoints/clsft_E9.ckpt (frozen pi_ref) through the spacer/ adapter, and how the anchoring loss flows back to update pi_theta only.</desc>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect x="0" y="0" width="700" height="760" fill="#ffffff"/>

<text x="350" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a18">GPUDrive  ⇄  CAT-K coupling — how the repos + checkpoint connect</text>

<!-- B1: GPUDrive + pi_theta -->
<rect x="70" y="50" width="560" height="92" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="1"/>
<text x="350" y="71" text-anchor="middle" font-size="14" font-weight="600" fill="#d8e8fb">① GPUDrive — simulator + π_θ (self-play)</text>
<text x="350" y="91" text-anchor="middle" font-size="12" fill="#b5d4f4">env on GPUDrive_mini · π_θ = TokenPolicy (GPUDrive late-fusion MLP, 2048-token head, 304k)</text>
<text x="350" y="108" text-anchor="middle" font-size="12" fill="#b5d4f4">samples a token → M1 token→state driver advances the sim (continuous `state` dynamics)</text>
<text x="350" y="130" text-anchor="middle" font-size="11" fill="#7fa9d6">repo: reference_code/gpudrive   ·   code: spacer/policy_token.py, token_decode.py</text>

<line x1="350" y1="142" x2="350" y2="176" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="365" y="163" font-size="11" fill="#6b6a64">live rollout state — 91 steps, global frame (LogTrajectory / GlobalEgoState / RoadGraph)</text>

<!-- B2: the adapter (the coupling) -->
<rect x="70" y="178" width="560" height="96" rx="8" fill="#712b13" stroke="#f0997b" stroke-width="1"/>
<rect x="64" y="172" width="572" height="108" rx="12" fill="none" stroke="#E24B4A" stroke-width="2" stroke-dasharray="6 4"/>
<text x="350" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#E24B4A">★ THE COUPLING — no catk/ edits; reuses CAT-K preprocessing verbatim</text>
<text x="350" y="199" text-anchor="middle" font-size="14" font-weight="600" fill="#f5c4b3">② GPUDrive→SMART adapter</text>
<text x="350" y="219" text-anchor="middle" font-size="12" fill="#f0997b">extract_gpudrive_scene → build_track_infos / build_map_data</text>
<text x="350" y="236" text-anchor="middle" font-size="12" fill="#f0997b">REUSE CAT-K get_agent_features() + preprocess_map()  →  HeteroData</text>
<text x="350" y="258" text-anchor="middle" font-size="11" fill="#c8836a">code: spacer/gpudrive_to_smart.py   (waymo stub avoids TF/waymo conflict)</text>

<line x1="350" y1="280" x2="350" y2="314" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="365" y="301" font-size="11" fill="#6b6a64">HeteroData  (agent + map_save + pt_token)</text>

<!-- B3: CAT-K pi_ref + checkpoint -->
<rect x="70" y="316" width="560" height="100" rx="8" fill="#712b13" stroke="#f0997b" stroke-width="1"/>
<text x="350" y="337" text-anchor="middle" font-size="14" font-weight="600" fill="#f5c4b3">③ CAT-K reference model  π_ref  (FROZEN, forward-only)</text>
<text x="350" y="357" text-anchor="middle" font-size="12" fill="#f0997b">TokenProcessor (agent_vocab_555_s2.pkl → 2048 tokens) → SMARTDecoder</text>
<text x="350" y="374" text-anchor="middle" font-size="12" fill="#f0997b">weights loaded from →  checkpoints/clsft_E9.ckpt  (SMART-tiny-CLSFT)</text>
<text x="350" y="396" text-anchor="middle" font-size="11" fill="#c8836a">repo: reference_code/catk · output: next_token_logits [A,16,2048] = π_ref(·|s)</text>

<!-- split to anchoring: pi_theta (left) and pi_ref (right) -->
<path d="M150 416 L150 452 L330 452" fill="none" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar)"/>
<path d="M350 416 L350 452" fill="none" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="150" y="438" text-anchor="middle" font-size="11" fill="#6b6a64">π_θ(·|o) 2048</text>
<text x="430" y="438" text-anchor="middle" font-size="11" fill="#6b6a64">π_ref(·|s) 2048  (same vocab — cadence invariant)</text>

<!-- B4: anchoring (M3) -->
<rect x="70" y="454" width="560" height="92" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="1"/>
<text x="350" y="475" text-anchor="middle" font-size="14" font-weight="600" fill="#9fe1cb">④ Anchoring  (M3)  +  GPUDrive task reward</text>
<text x="350" y="495" text-anchor="middle" font-size="12" fill="#5dcaa5">Eq. 3:  r_human = log π_ref(a_t | s_t)      Eq. 5:  D_KL = Σ_2048 π_θ·log(π_θ/π_ref)</text>
<text x="350" y="512" text-anchor="middle" font-size="12" fill="#5dcaa5">r_task from GPUDrive (goal / collision / off-road)</text>
<text x="350" y="534" text-anchor="middle" font-size="11" fill="#3f9f86">closed-form over the shared 2048 tokens · 0.5 s / 2 Hz cadence</text>

<line x1="350" y1="546" x2="350" y2="580" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar)"/>

<!-- B5: loss (Eq 2) -->
<rect x="120" y="582" width="460" height="74" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="1"/>
<text x="350" y="606" text-anchor="middle" font-size="14" font-weight="600" fill="#cecbf6">⑤  Loss  =  L_PPO  −  β·D_KL  +  α·r_human   (Eq. 2 / Eq. 1)</text>
<text x="350" y="626" text-anchor="middle" font-size="12" fill="#afa9ec">PPO (PufferLib) — M4</text>
<text x="350" y="644" text-anchor="middle" font-size="11" fill="#8983c9">backprop updates π_θ ONLY  ·  π_ref stays frozen</text>

<!-- feedback loop: loss -> pi_theta -->
<path d="M120 619 L40 619 L40 96 L70 96" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<text x="44" y="360" font-size="11" fill="#6b6a64" transform="rotate(-90 44 360)" text-anchor="middle">gradient → π_θ update (π_ref frozen)</text>

<!-- per-box validation status badges -->
<g font-size="10.5" font-weight="600" text-anchor="middle">
<rect x="498" y="56" width="128" height="20" rx="10" fill="#15803d"/>
<text x="562" y="70" fill="#ffffff">✓ Test 2 · M1 · M2</text>
<rect x="510" y="184" width="116" height="20" rx="10" fill="#15803d"/>
<text x="568" y="198" fill="#ffffff">✓ Tests 3–5</text>
<rect x="520" y="322" width="106" height="20" rx="10" fill="#15803d"/>
<text x="573" y="336" fill="#ffffff">✓ Test 1</text>
<rect x="504" y="460" width="122" height="20" rx="10" fill="#b45309"/>
<text x="565" y="474" fill="#ffffff">⏳ M3 — next</text>
<rect x="470" y="588" width="106" height="20" rx="10" fill="#b45309"/>
<text x="523" y="602" fill="#ffffff">⏳ M4</text>
</g>

<!-- runtime note -->
<text x="350" y="690" text-anchor="middle" font-size="11" fill="#6b6a64">runtime: one container — `catk-spacer:latest` (GPUDrive engine + CAT-K deps), RTX 3060</text>
<text x="350" y="710" text-anchor="middle" font-size="11" fill="#9c9a92">checkpoints/ : pre_bc_E31.ckpt (SMART BC)  ·  clsft_E9.ckpt (CAT-K SFT, used as π_ref)</text>
<text x="350" y="730" text-anchor="middle" font-size="11" fill="#9c9a92">status: ①②③ built &amp; validated (Tests 2–5, M1–M2)  ·  ④ M3 (next)  ·  ⑤ M4</text>
</svg>
